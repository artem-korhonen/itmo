commands.info=1) insert - agregar nuevo elemento con la clave especificada\n2) update - actualizar elemento de la colección cuyo id coincida\n3) remove_key - eliminar elemento por su clave\n4) clear - limpiar la colección\n5) remove_greater - remover elementos que excedan el valor especificado\n6) replace_if_greater - reemplazar valor si el nuevo es mayor\n7) remove_lower_key - remover elementos con clave menor a la especificada\n8) filter_greater_than_timezone - mostrar elementos con zona horaria mayor\n9) print_unique_governor - mostrar valores únicos del campo gobernador\n10) print_field_descending_governor - mostrar valores del gobernador en orden descendente\n11) info - mostrar información de la colección\n12) exit - salir del programa

