commands.info=1) insert - voeg een nieuw element toe met de opgegeven sleutel\n2) update - werk de waarde van het collectie-element bij waarvan de id gelijk is aan de opgegeven\n3) remove_key - verwijder een element uit de collectie op basis van de sleutel\n4) clear - wis de collectie\n5) remove_greater - verwijder alle items uit de collectie die hoger zijn dan de opgegeven waarde\n6) replace_if_greater - vervang de waarde bij sleutel als de nieuwe waarde groter is dan de oude\n7) remove_lower_key - verwijder uit de collectie alle items waarvan de sleutel kleiner is dan de opgegeven\n8) filter_greater_than_timezone tijdzone - geef elementen weer waarvan de tijdzone groter is dan de opgegeven\n9) print_unique_governor - toon unieke waarden van het gouverneur-veld van alle elementen in de collectie\n10) print_field_descending_governor - toon gouverneur-velden van alle elementen in aflopende volgorde\n11) info - toon informatie over de collectie\n12) exit - sluit het programma  

