commands.info=1) insert - add a new element with the specified key\n2) update - update the value of the collection element, whose id is equal to the specified one\n3) remove_key - delete an element from the collection by its key\n4) clear - clear the collection\n5) remove_greater - remove all items from the collection that exceed the specified value\n6) replace_if_greater - replace the value by key if the new value is greater than the old one\n7) remove_lower_key - remove from the collection all items whose key is less than the specified one\n8) filter_greater_thi_timezone timezone - output the elements whose timezone field value is greater than the specified one\n9) print_unique_governor - output the unique values of the governor field of all elements in the collection\n10) print_field_descending_governor - output the values of the governor field of all elements in descending order\n11) info - output information about the collection\n12) exit - end the program
