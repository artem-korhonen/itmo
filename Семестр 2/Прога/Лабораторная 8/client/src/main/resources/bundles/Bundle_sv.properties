commands.info=1) insert - lägg till ett nytt element med angiven nyckel\n2) update - uppdatera värdet på samlingselementet vars id motsvarar det angivna\n3) remove_key - ta bort ett element från samlingen via dess nyckel\n4) clear - rensa samlingen\n5) remove_greater - ta bort alla objekt från samlingen som överstiger angivet värde\n6) replace_if_greater - ersätt värdet via nyckel om det nya värdet är större än det gamla\n7) remove_lower_key - ta bort från samlingen alla objekt vars nyckel är mindre än den angivna\n8) filter_greater_thi_timezone tidszon - visa element vars tidszonfält är större än den angivna\n9) print_unique_governor - visa unika värden för guvernörsfältet för alla element i samlingen\n10) print_field_descending_governor - visa guvernörsfältets värden för alla element i fallande ordning\n11) info - visa information om samlingen\n12) exit - avsluta programmet
