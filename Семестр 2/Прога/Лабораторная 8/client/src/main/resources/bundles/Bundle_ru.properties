commands.info=1) insert - добавить новый элемент с указанным ключом\n2) update - обновить значение элемента коллекции, id которого равен указанному\n3) remove_key - удалить элемент из коллекции по его ключу\n4) clear - очистить коллекцию\n5) remove_greater - удалить из коллекции все элементы, превышающие заданное значение\n6) replace_if_greater - заменить значение по ключу, если новое значение больше старого\n7) remove_lower_key - удалить из коллекции все элементы, ключ которых меньше заданного\n8) filter_greater_thi_timezone timezone - вывести элементы, значение поля timezone которых больше заданного\n9) print_unique_governor - вывести уникальные значения поля governor всех элементов коллекции\n10) print_field_descending_governor - вывести значения поля governor всех элементов в порядке убывания\n11) info - вывести информацию о коллекции\n12) exit - завершить программу
